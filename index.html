<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Github page</title>
    <!-- Tailwind + daisyUI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.4.19/dist/full.css" rel="stylesheet" type="text/css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 2rem auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .card-open { border-top: 6px solid #10b981; }
        .card-closed { border-top: 6px solid #a855f7; }
        .tab-active { background-color: #e2e8f0; font-weight: 600; }
        .issue-grid { display: grid; gap: 1.5rem; grid-template-columns: repeat(1, 1fr); }
        @media (min-width: 640px) { .issue-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 1024px) { .issue-grid { grid-template-columns: repeat(4, 1fr); } }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { max-width: 520px; width: 90%; max-height: 80vh; overflow-y: auto; }
        /* custom badge style for uppercase */
        .badge-uppercase { text-transform: uppercase; font-weight: 600; letter-spacing: 0.02em; }
    </style>
</head>
<body class="bg-gray-50 font-sans">

<!--  LOGIN PAGE  -->
<div id="loginContainer" class="min-h-screen flex items-center justify-center p-4">
    <div class="card w-full max-w-md bg-white shadow-xl">
        <div class="card-body">
            <div class="text-center mb-6">
                <div class="flex justify-center mb-3">
                     <img src="assets/github-logo.png" alt="">
                </div>
                <h2 class="text-3xl font-bold">GitHub Issues Tracker</h2>
                <p class="text-gray-500 mt-1">Sign in to manage your issues</p>
            </div>
            <div class="space-y-4">
                <div class="form-control">
                    <label class="label"><span class="label-text">Username</span></label>
                    <input type="text" id="loginUsername" placeholder="admin" class="input input-bordered w-full" value="admin" />
                </div>
                <div class="form-control">
                    <label class="label"><span class="label-text">Password</span></label>
                    <input type="password" id="loginPassword" placeholder="••••••••" class="input input-bordered w-full" value="admin123" />
                </div>
                <button id="loginBtn" class="btn btn-primary w-full">Sign in</button>
                <div class="text-center text-sm text-gray-400">
                    demo: <span class="font-mono">admin / admin123</span>
                </div>
            </div>
        </div>
    </div>
</div>

<!--   MAIN APP (hidden until login)  -->
<div id="appContainer" class="hidden max-w-7xl mx-auto p-4 md:p-6">

    <!-- navbar with logo & search -->
    <div class="flex flex-col sm:flex-row items-center justify-between gap-4 mb-8">
        <div class="flex items-center gap-2 text-2xl font-bold text-primary">
           <img style="width: 50px;" src="assets/github-logo.png" alt="">
            <span>GitHub Issues Tracker</span>
        </div>
        <div class="flex w-full sm:w-auto gap-2">
            <input type="text" id="searchInput" placeholder="Search issues..." class="input input-bordered w-full sm:w-64" />
            <button id="searchBtn" class="btn btn-secondary">Search</button>
        </div>
    </div>

  
    <div class="tabs tabs-boxed mb-4 flex justify-start gap-1 p-1 bg-base-200 rounded-xl w-fit">
        <button id="tabAll" class="tab tab-active px-6 py-2 rounded-lg" data-status="all">All</button>
        <button id="tabOpen" class="tab px-6 py-2 rounded-lg" data-status="open">Open</button>
        <button id="tabClosed" class="tab px-6 py-2 rounded-lg" data-status="closed">Closed</button>
    </div>

   
    <div class="flex flex-wrap items-center justify-between bg-white p-4 rounded-xl shadow-sm mb-6">
        <div class="flex items-center gap-3">
            <i class="fas fa-tag text-2xl text-primary"></i>
            <span class="text-lg font-medium">Issues</span>
            <span id="totalCount" class="badge badge-primary badge-lg">0</span>
        </div>
        <div class="flex gap-4 text-sm">
            <span class="flex items-center gap-1"><span class="w-3 h-3 bg-green-500 rounded-full"></span> Open <span id="openCount">0</span></span>
            <span class="flex items-center gap-1"><span class="w-3 h-3 bg-purple-500 rounded-full"></span> Closed <span id="closedCount">0</span></span>
        </div>
    </div>

 
    <div id="loader" class="loader hidden"></div>

 
    <div id="issuesGrid" class="issue-grid mt-4"></div>

  
    <div id="noIssuesMsg" class="text-center py-12 text-gray-400 hidden">
        <i class="fas fa-folder-open text-6xl mb-3"></i>
        <p>No issues found</p>
    </div>

 
    <div id="modalOverlay" class="modal-overlay hidden">
        <div class="modal-content bg-white rounded-2xl p-6 shadow-2xl relative">
         
            <button id="closeModalBtn" class="absolute top-3 right-3 btn btn-sm btn-circle btn-ghost">✕</button>
   
            <div id="modalBody" class="space-y-4">
      
            </div>
             
            <div class="mt-6 flex justify-end">
                <button id="closeBottomBtn" class="btn btn-outline btn-primary px-8">Close</button>
            </div>
        </div>
    </div>
</div>

 <script src="git.js"></script>
 
 

</body>
</html>
